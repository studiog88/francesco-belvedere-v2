<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="preload" href="fonts/Work_Sans/WorkSans-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="css/tokens/primitives.css">
  <link rel="stylesheet" href="css/tokens/responsive.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="js/main.js" defer></script>
</head>
<body>
  <div id="hero">
    <h1 class="visually-hidden">FRANCESCO BELVEDERE</h1>
    <img class="hero-wordmark" src="assets/logos/wordmark.svg" alt="Francesco Belvedere">

    <nav class="hero-nav" aria-label="Primary">
      <a class="hero-nav-link" href="#about">About</a>
      <a class="hero-nav-link" href="#work">Work</a>
      <a class="hero-nav-link" href="#contact">Contact</a>
    </nav>

    <div class="hero-placeholder-image" aria-hidden="true"></div>
  </div>

  <div id="work">
    <h2 class="work-heading">Work</h2>
    <div class="work-grid">
      <article class="work-card">
        <img class="work-card-image" src="assets/images/project-tile-FPO-01.png" alt="Project tile placeholder 01">
        <h3 class="work-card-title">Project Name 01</h3>
        <p class="work-card-description">Short project description goes here.</p>
      </article>

      <article class="work-card">
        <img class="work-card-image" src="assets/images/project-tile-FPO-02.png" alt="Project tile placeholder 02">
        <h3 class="work-card-title">Project Name 02</h3>
        <p class="work-card-description">Short project description goes here.</p>
      </article>

      <article class="work-card">
        <img class="work-card-image" src="assets/images/project-tile-FPO-03.png" alt="Project tile placeholder 03">
        <h3 class="work-card-title">Project Name 03</h3>
        <p class="work-card-description">Short project description goes here.</p>
      </article>
    </div>
  </div>
</body>
</html>
